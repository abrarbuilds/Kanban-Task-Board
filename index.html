<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Task Board</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header class="topbar">
        <div class="topbar-title">
            <span class="icon">📖</span>
            <h1>Kanban Task Board</h1>
            <span class="meta">· Q3 2026</span>
        </div>
        <div class="topbar-right">
            <div class="stat todo">
                <div class="num" id="statTodo">0</div>
                <div class="lbl">TODO</div>
            </div>
            <div class="stat progress">
                <div class="num" id="statProgress">0</div>
                <div class="lbl">IN PROGRESS</div>
            </div>
            <div class="stat done">
                <div class="num" id="statDone">0</div>
                <div class="lbl">DONE</div>
            </div>
            <div class="progress-wrap">
                <div class="progress-track">
                    <div class="progress-fill" id="progressFill" style="width:0%"></div>
                </div>
                <span class="progress-pct" id="progressPct">0%</span>
            </div>
            <button class="reset-btn" id="resetBtn">↺ Reset</button>
        </div>
    </header>

    <div class="subbar">Drag cards between columns · Click to edit · Changes saved automatically</div>

    <main class="board" id="board"></main>

    <!-- Modal -->
    <div class="overlay" id="overlay">
        <div class="modal">
            <h2 id="modalTitle">New card</h2>
            <form id="cardForm">
                <div class="field">
                    <label>Title</label>
                    <input type="text" id="fTitle" required maxlength="80">
                </div>
                <div class="field">
                    <label>Description</label>
                    <textarea id="fDesc" maxlength="240"></textarea>
                </div>
                <div class="field">
                    <label>Tags (comma separated)</label>
                    <input type="text" id="fTags" placeholder="e.g. Backend, Infra">
                </div>
                <div class="field-row">
                    <div class="field">
                        <label>Priority</label>
                        <select id="fPriority">
                            <option value="high">High</option>
                            <option value="medium" selected>Medium</option>
                            <option value="low">Low</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Assignee</label>
                        <input type="text" id="fAssignee" maxlength="3" placeholder="ABRAR">
                    </div>
                </div>
                <div class="field-row">
                    <div class="field">
                        <label>Due date</label>
                        <input type="date" id="fDate">
                    </div>
                    <div class="field">
                        <label>Column</label>
                        <select id="fColumn">
                            <option value="todo">To Do</option>
                            <option value="inprogress">In Progress</option>
                            <option value="done">Done</option>
                        </select>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-danger" id="deleteBtn" style="display:none;">Delete
                        card</button>
                    <div style="margin-left:auto;display:flex;gap:8px;">
                        <button type="button" class="btn btn-ghost" id="cancelBtn">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <!-- Modules load in dependency order: state → render → dragdrop → modal → main -->
    <script src="Js/state.js"></script>
    <script src="Js/render.js"></script>
    <script src="Js/dragdrop.js"></script>
    <script src="Js/modal.js"></script>
    <script src="Js/main.js"></script>
</body>

</html>
